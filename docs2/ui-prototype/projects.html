<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LoomiDBX — 项目管理</title>
  <style>
    :root {
      --bg: #ffffff; --surface: #f7f8fa; --fg: #1c2b33; --fg-2: #5d6c7b;
      --muted: #65676b; --border: #ced0d4; --border-soft: #e8eaed;
      --accent: #0064e0; --accent-on: #ffffff; --success: #31a24c; --warn: #f7b928; --danger: #e41e3f;
      --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --font-mono: ui-monospace, 'SF Mono', Menlo, monospace;
      --text-xs: 11px; --text-sm: 13px; --text-base: 14px; --text-lg: 16px; --text-xl: 20px;
      --radius: 8px; --sidebar-w: 56px; --topbar-h: 48px;
      --sb-bg: #1a1d21; --sb-fg: #b0b3b8; --sb-active: rgba(0,100,224,0.2);
      --sb-active-fg: #47a5fa; --sb-divider: rgba(255,255,255,0.08); --sb-hover: rgba(255,255,255,0.08);
    }
    [data-theme="dark"] {
      --bg: #0d0f12; --surface: #161a1f; --fg: #e4e6eb; --fg-2: #b0b3b8;
      --muted: #8a8d91; --border: #2d3136; --border-soft: #22262b; --sb-bg: #0d0f12;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); font-size: var(--text-base); color: var(--fg); background: var(--bg); height: 100vh; overflow: hidden; }
    button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
    input, select, textarea { font: inherit; }
    a { color: var(--accent); text-decoration: none; }

    .app { display: flex; height: 100vh; }
    .sidebar {
      width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--sb-bg); color: var(--sb-fg);
      display: flex; flex-direction: column; align-items: center; padding: 12px 0; gap: 4px;
    }
    .sb-logo {
      width: 36px; height: 36px; border-radius: 10px; background: var(--accent); color: var(--accent-on);
      display: grid; place-items: center; font-size: 14px; font-weight: 700; margin-bottom: 4px; flex-shrink: 0;
      text-decoration: none;
    }
    .sb-btn {
      width: 40px; height: 40px; border-radius: 10px; display: grid; place-items: center;
      color: var(--sb-fg); transition: background 0.15s, color 0.15s; position: relative; text-decoration: none;
    }
    .sb-btn:hover { background: var(--sb-hover); color: #e4e6eb; }
    .sb-btn.active { background: var(--sb-active); color: var(--sb-active-fg); }
    .sb-btn svg { width: 20px; height: 20px; }
    .sb-btn .tooltip {
      display: none; position: absolute; left: 52px; top: 50%; transform: translateY(-50%);
      background: #1c1e21; color: #e4e6eb; padding: 4px 10px; border-radius: 6px;
      font-size: 12px; white-space: nowrap; z-index: 50; pointer-events: none;
    }
    .sb-btn:hover .tooltip { display: block; }
    .sb-spacer { flex: 1; }
    .sb-avatar {
      width: 32px; height: 32px; border-radius: 50%; background: #2d3136; color: var(--sb-fg);
      display: grid; place-items: center; font-size: 12px; font-weight: 600;
    }

    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .topbar {
      height: var(--topbar-h); min-height: var(--topbar-h); border-bottom: 1px solid var(--border-soft);
      display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: var(--bg);
    }
    .topbar-left { display: flex; align-items: center; gap: 8px; font-size: var(--text-sm); }
    .topbar-left .bc { color: var(--muted); }
    .topbar-left .bc-cur { color: var(--fg); font-weight: 600; }
    .topbar-right { display: flex; align-items: center; gap: 6px; }
    .topbar-right select, .topbar-right button {
      padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px;
      font-size: var(--text-xs); background: var(--bg); color: var(--fg);
    }
    .content { flex: 1; overflow-y: auto; }

    .project-screen { padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .proj-header { display: flex; align-items: center; justify-content: space-between; }
    .proj-header h2 { font-size: var(--text-xl); font-weight: 700; }
    .btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 14px; border-radius: 6px; font-size: var(--text-sm); font-weight: 500; transition: background 0.15s; }
    .btn-primary { background: var(--accent); color: var(--accent-on); }
    .btn-primary:hover { background: #0143b5; }
    .btn-ghost { color: var(--fg); }
    .btn-ghost:hover { background: var(--surface); }
    .btn-sm { padding: 4px 10px; font-size: var(--text-xs); }

    .proj-list { display: flex; flex-direction: column; gap: 8px; }
    .proj-card {
      display: flex; align-items: center; gap: 14px; padding: 14px 16px;
      border: 1px solid var(--border-soft); border-radius: var(--radius);
      background: var(--bg); cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s;
    }
    .proj-card:hover { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
    .proj-card .pc-icon {
      width: 36px; height: 36px; border-radius: 8px; display: grid; place-items: center;
      background: var(--surface); color: var(--muted); flex-shrink: 0;
    }
    .proj-card .pc-icon svg { width: 18px; height: 18px; }
    .proj-card .pc-body { flex: 1; min-width: 0; }
    .proj-card .pc-name { font-weight: 600; font-size: var(--text-sm); }
    .proj-card .pc-tables { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
    .proj-card .pc-table-tag { font-size: 10px; padding: 2px 6px; border-radius: 3px; background: var(--surface); color: var(--fg-2); }
    .proj-card .pc-table-tag.more { color: var(--muted); }
    .proj-card .pc-time { font-size: var(--text-xs); color: var(--muted); margin-top: 4px; }
    .proj-card .pc-actions { display: flex; gap: 2px; flex-shrink: 0; }
    .proj-card .pc-actions button {
      width: 28px; height: 28px; border-radius: 5px; display: grid; place-items: center; color: var(--muted);
    }
    .proj-card .pc-actions button:hover { background: var(--surface); color: var(--fg); }
    .proj-card .pc-actions button.danger:hover { background: rgba(228,30,63,0.08); color: var(--danger); }
    .proj-card .pc-actions button svg { width: 14px; height: 14px; }

    /* Dialogs */
    .dlg-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; place-items: center; z-index: 100; }
    .dlg-overlay.open { display: grid; }
    .dlg { background: var(--bg); border-radius: 12px; padding: 24px; width: 440px; max-width: 90vw; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
    .dlg h3 { font-size: var(--text-lg); font-weight: 700; margin-bottom: 18px; }
    .dlg .field { margin-bottom: 12px; }
    .dlg .field label { display: block; font-size: var(--text-xs); font-weight: 600; color: var(--fg-2); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
    .dlg .field input, .dlg .field select, .dlg .field textarea {
      width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px;
      font-size: var(--text-sm); background: var(--bg); color: var(--fg);
    }
    .dlg .field input:focus, .dlg .field select:focus { outline: none; border-color: var(--accent); }
    .dlg-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }

    .pe-table-list { display: flex; flex-direction: column; gap: 6px; }
    .pe-table-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border: 1px solid var(--border-soft); border-radius: 6px; background: var(--surface); }
    .pe-order { width: 24px; height: 24px; border-radius: 50%; display: grid; place-items: center; background: var(--accent); color: var(--accent-on); font-size: 11px; font-weight: 700; flex-shrink: 0; }
    .pe-table-info { flex: 1; min-width: 0; }
    .pe-table-name { font-weight: 600; font-size: var(--text-sm); font-family: var(--font-mono); }
    .pe-table-meta { font-size: var(--text-xs); color: var(--muted); margin-top: 2px; }
    .pe-quantity { display: flex; align-items: center; gap: 6px; }
    .pe-quantity label { font-size: var(--text-xs); color: var(--muted); }
    .pe-quantity input { padding: 4px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: var(--text-sm); }
    .pe-remove { width: 28px; height: 28px; border-radius: 4px; display: grid; place-items: center; color: var(--muted); flex-shrink: 0; }
    .pe-remove:hover { background: rgba(228,30,63,0.08); color: var(--danger); }

    .ph-row { display: flex; align-items: center; gap: 12px; padding: 12px; border: 1px solid var(--border-soft); border-radius: 6px; }
    .ph-row .ph-status { width: 28px; height: 28px; border-radius: 50%; display: grid; place-items: center; flex-shrink: 0; }
    .ph-row .ph-status.ok { background: rgba(49,162,76,0.12); color: var(--success); }
    .ph-row .ph-status.fail { background: rgba(228,30,63,0.12); color: var(--danger); }
    .ph-row .ph-status.run { background: rgba(0,100,224,0.1); color: var(--accent); }
    .ph-row .ph-info { flex: 1; }
    .ph-row .ph-name { font-weight: 600; font-size: var(--text-sm); }
    .ph-row .ph-detail { font-size: var(--text-xs); color: var(--muted); }
    .ph-row .ph-meta { font-size: var(--text-xs); color: var(--muted); font-family: var(--font-mono); text-align: right; }
    .badge { display: inline-flex; align-items: center; gap: 3px; padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: 600; }
    .badge-ok { background: rgba(49,162,76,0.12); color: var(--success); }
    .badge-err { background: rgba(228,30,63,0.12); color: var(--danger); }
    .badge-run { background: rgba(0,100,224,0.1); color: var(--accent); }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <a class="sb-logo" href="index.html" title="返回导航">L</a>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;">
        <a class="sb-btn" href="schema.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M21 12c0 1.66-4.03 3-9 3s-9-1.34-9-3"></path><path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5"></path></svg>
          <span class="tooltip">Schema 浏览</span>
        </a>
        <a class="sb-btn active" href="projects.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
          <span class="tooltip">项目管理</span>
        </a>
      </div>
      <div class="sb-spacer"></div>
      <a class="sb-btn" href="login.html">
        <div class="sb-avatar">CG</div>
        <span class="tooltip">cg · 退出登录</span>
      </a>
    </aside>

    <div class="main">
      <header class="topbar">
        <div class="topbar-left">
          <span class="bc">LoomiDBX</span>
          <span style="color:var(--border)">/</span>
          <span class="bc-cur">项目管理</span>
        </div>
        <div class="topbar-right">
          <select id="lang-select" title="语言">
            <option value="zh">中文</option>
            <option value="en">EN</option>
          </select>
          <button onclick="toggleTheme()" title="切换主题" style="display:inline-flex;align-items:center;gap:3px;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
          </button>
          <a class="sb-btn" href="settings.html" title="系统设置" style="width:auto;height:auto;padding:4px 8px;border:1px solid var(--border);border-radius:6px;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
          </a>
        </div>
      </header>

      <div class="content">
        <div class="project-screen">
          <div class="proj-header">
            <h2>项目管理</h2>
            <button class="btn btn-primary" onclick="openDlg('proj-dlg')">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
              新建项目
            </button>
          </div>
          <div class="proj-list" id="proj-list"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- New Project Dialog -->
  <div class="dlg-overlay" id="proj-dlg" onclick="if(event.target===this)closeDlg('proj-dlg')">
    <div class="dlg">
      <h3>新建项目</h3>
      <div class="field"><label>项目名称</label><input type="text" placeholder="例如: 电商演示数据"></div>
      <div class="field"><label>描述</label><textarea rows="2" placeholder="项目用途说明" style="resize:vertical;"></textarea></div>
      <div class="field"><label>数据库连接</label><select><option>生产-MySQL (ecommerce_db)</option><option>测试-PostgreSQL (test_db)</option></select></div>
      <div class="dlg-actions">
        <button class="btn btn-ghost" onclick="closeDlg('proj-dlg')">取消</button>
        <button class="btn btn-primary" onclick="closeDlg('proj-dlg')">创建</button>
      </div>
    </div>
  </div>

  <!-- Project Edit Dialog -->
  <div class="dlg-overlay" id="proj-edit-dlg" onclick="if(event.target===this)closeDlg('proj-edit-dlg')">
    <div class="dlg" style="width:560px;">
      <h3>编辑项目</h3>
      <div class="field"><label>项目名称</label><input type="text" value="电商演示数据"></div>
      <div class="field"><label>描述</label><textarea rows="2" style="resize:vertical;">客户演示用完整电商数据集</textarea></div>
      <div style="margin-top:16px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
          <label style="font-size:var(--text-xs);font-weight:600;color:var(--fg-2);text-transform:uppercase;letter-spacing:0.04em;">数据表配置</label>
          <button class="btn btn-ghost btn-sm">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            添加表
          </button>
        </div>
        <div class="pe-table-list" id="pe-table-list">
          <div class="pe-table-item"><div class="pe-order">1</div><div class="pe-table-info"><div class="pe-table-name">users</div><div class="pe-table-meta">public · users</div></div><div class="pe-quantity"><label>数量</label><input type="number" value="1000" min="1" style="width:80px;"></div><button class="pe-remove" onclick="this.closest('.pe-table-item').remove();updatePeOrder()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button></div>
          <div class="pe-table-item"><div class="pe-order">2</div><div class="pe-table-info"><div class="pe-table-name">orders</div><div class="pe-table-meta">public · orders</div></div><div class="pe-quantity"><label>数量</label><input type="number" value="5000" min="1" style="width:80px;"></div><button class="pe-remove" onclick="this.closest('.pe-table-item').remove();updatePeOrder()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button></div>
          <div class="pe-table-item"><div class="pe-order">3</div><div class="pe-table-info"><div class="pe-table-name">products</div><div class="pe-table-meta">public · products</div></div><div class="pe-quantity"><label>数量</label><input type="number" value="2000" min="1" style="width:80px;"></div><button class="pe-remove" onclick="this.closest('.pe-table-item').remove();updatePeOrder()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button></div>
          <div class="pe-table-item"><div class="pe-order">4</div><div class="pe-table-info"><div class="pe-table-name">categories</div><div class="pe-table-meta">public · categories</div></div><div class="pe-quantity"><label>数量</label><input type="number" value="100" min="1" style="width:80px;"></div><button class="pe-remove" onclick="this.closest('.pe-table-item').remove();updatePeOrder()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button></div>
          <div class="pe-table-item"><div class="pe-order">5</div><div class="pe-table-info"><div class="pe-table-name">order_items</div><div class="pe-table-meta">public · order_items</div></div><div class="pe-quantity"><label>数量</label><input type="number" value="20000" min="1" style="width:80px;"></div><button class="pe-remove" onclick="this.closest('.pe-table-item').remove();updatePeOrder()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button></div>
          <div class="pe-table-item"><div class="pe-order">6</div><div class="pe-table-info"><div class="pe-table-name">reviews</div><div class="pe-table-meta">public · reviews</div></div><div class="pe-quantity"><label>数量</label><input type="number" value="5000" min="1" style="width:80px;"></div><button class="pe-remove" onclick="this.closest('.pe-table-item').remove();updatePeOrder()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button></div>
        </div>
        <div style="font-size:var(--text-xs);color:var(--muted);margin-top:8px;">
          顺序决定数据生成顺序。外键依赖的表（如 order_items 依赖 orders）需在父表之后生成。
        </div>
      </div>
      <div class="dlg-actions">
        <button class="btn btn-ghost" onclick="closeDlg('proj-edit-dlg')">取消</button>
        <button class="btn btn-primary" onclick="closeDlg('proj-edit-dlg')">保存</button>
      </div>
    </div>
  </div>

  <!-- Project History Dialog -->
  <div class="dlg-overlay" id="proj-history-dlg" onclick="if(event.target===this)closeDlg('proj-history-dlg')">
    <div class="dlg" style="width:480px;">
      <h3>执行记录</h3>
      <div id="ph-list" style="display:flex;flex-direction:column;gap:8px;margin-top:8px;"></div>
      <div class="dlg-actions">
        <button class="btn btn-ghost" onclick="closeDlg('proj-history-dlg')">关闭</button>
      </div>
    </div>
  </div>

  <script>
    /* ─── Data ──────────────────────────────────────────── */
    const projects = [
      { id: 'p1', name: '电商演示数据', desc: '客户演示用完整电商数据集', conn: '生产-MySQL', db: 'ecommerce_db', tables: 6, rows: 12400, status: 'done', updated: '2026-05-28 10:30',
        execHistory: [
          { name: '电商数据生成 #3', time: '2026-05-28 10:30', duration: '2m 14s', rows: 12400, status: 'ok' },
          { name: '电商数据生成 #2', time: '2026-05-27 16:45', duration: '1m 58s', rows: 8200, status: 'warn', detail: 'order_items 部分失败' },
          { name: '电商数据生成 #1', time: '2026-05-27 14:20', duration: '2m 05s', rows: 12400, status: 'ok' },
        ] },
      { id: 'p2', name: '性能压测集', desc: '百万级数据压测', conn: '测试-PostgreSQL', db: 'test_db', tables: 4, rows: 1000000, status: 'running', updated: '2026-05-28 11:00',
        execHistory: [{ name: '性能压测集 #1', time: '2026-05-28 11:00', duration: '执行中…', rows: null, status: 'run' }] },
      { id: 'p3', name: '开发环境填充', desc: '本地开发用基础数据', conn: '生产-MySQL', db: 'ecommerce_db', tables: 8, rows: null, status: 'draft', updated: '2026-05-27 15:20',
        execHistory: [{ name: '开发环境首次填充', time: '2026-05-26 09:10', duration: '0m 42s', rows: 3100, status: 'fail', detail: '连接超时' }] },
    ];

    const tableTagMap = {
      p1: ['users', 'orders', 'products', 'categories', 'order_items', 'reviews'],
      p2: ['test_users', 'test_orders', 'test_products', 'test_logs'],
      p3: ['users', 'orders', 'products', 'categories', 'order_items', 'reviews', 'payments', 'addresses'],
    };

    /* ─── Theme ─────────────────────────────────────────── */
    function toggleTheme() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      setTheme(isDark ? 'light' : 'dark');
    }
    function setTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
    }

    /* ─── Projects rendering ────────────────────────────── */
    function renderProjects() {
      const list = document.getElementById('proj-list');
      list.innerHTML = projects.map(p => {
        const tableNames = tableTagMap[p.id] || [];
        const displayTables = tableNames.slice(0, 4);
        const moreCount = tableNames.length > 4 ? tableNames.length - 4 : 0;

        return `<div class="proj-card" onclick="openProjectEdit('${p.id}')">
          <div class="pc-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></div>
          <div class="pc-body">
            <div class="pc-name">${p.name}</div>
            <div class="pc-tables">
              ${displayTables.map(t => `<span class="pc-table-tag">${t}</span>`).join('')}
              ${moreCount > 0 ? `<span class="pc-table-tag more">+${moreCount}</span>` : ''}
            </div>
            <div class="pc-time">最后生成: ${p.updated}</div>
          </div>
          <div class="pc-actions" onclick="event.stopPropagation()">
            <button title="执行" onclick="execProject('${p.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="5 3 19 12 5 21 5 3"/></svg></button>
            <button title="执行记录" onclick="showProjectDetail('${p.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></button>
            <button class="danger" title="删除" onclick="deleteProject('${p.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
          </div>
        </div>`;
      }).join('');
    }

    function openProjectEdit(id) { openDlg('proj-edit-dlg'); }
    function execProject(id) { console.log('exec', id); }
    function deleteProject(id) { const idx = projects.findIndex(p => p.id === id); if (idx > -1) projects.splice(idx, 1); renderProjects(); }
    function updatePeOrder() {
      document.querySelectorAll('#pe-table-list .pe-table-item').forEach((item, i) => {
        item.querySelector('.pe-order').textContent = i + 1;
      });
    }

    function showProjectDetail(id) {
      const p = projects.find(pr => pr.id === id);
      if (!p) return;
      const statusMap = { ok: ['ok','成功'], fail: ['fail','失败'], warn: ['ok','部分失败'], run: ['run','执行中'] };
      document.getElementById('ph-list').innerHTML = p.execHistory.map(e => {
        const [statusCls, badgeText] = statusMap[e.status] || ['run', '未知'];
        return `<div class="ph-row">
          <div class="ph-status ${statusCls}">
            ${e.status === 'ok' ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>' :
              e.status === 'fail' ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' :
              '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>'}
          </div>
          <div class="ph-info">
            <div class="ph-name">${e.name}</div>
            <div class="ph-detail">${e.detail || e.time}</div>
          </div>
          <div class="ph-meta">
            <span class="badge badge-${statusCls === 'ok' ? 'ok' : statusCls === 'fail' ? 'err' : 'run'}">${badgeText}</span>
            <div style="margin-top:2px;">${e.rows ? e.rows.toLocaleString() + ' 行' : '—'} · ${e.duration}</div>
          </div>
        </div>`;
      }).join('');
      openDlg('proj-history-dlg');
    }

    /* ─── Dialogs ───────────────────────────────────────── */
    function openDlg(id) { document.getElementById(id).classList.add('open'); }
    function closeDlg(id) { document.getElementById(id).classList.remove('open'); }

    /* ─── Init ──────────────────────────────────────────── */
    renderProjects();
  </script>
</body>
</html>
