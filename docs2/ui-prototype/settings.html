<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LoomiDBX — 系统设置</title>
  <style>
    :root {
      --bg: #f0f2f5; --surface: #ffffff; --fg: #1c2b33; --fg-2: #5d6c7b;
      --muted: #65676b; --border: #ced0d4; --border-soft: #e8eaed;
      --accent: #0064e0; --accent-on: #ffffff; --accent-hover: #0054bf;
      --success: #31a24c; --warn: #f7b928; --danger: #e41e3f;
      --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --text-xs: 11px; --text-sm: 13px; --text-base: 14px; --text-lg: 16px; --text-xl: 20px;
      --radius: 8px;
    }
    [data-theme="dark"] {
      --bg: #0d0f12; --surface: #1a1d21; --fg: #e4e6eb; --fg-2: #b0b3b8;
      --muted: #8a8d91; --border: #2d3136; --border-soft: #22262b;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body); font-size: var(--text-base); color: var(--fg);
      background: var(--bg); min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
    input, select, textarea { font: inherit; }

    .dialog {
      background: var(--surface); border: 1px solid var(--border-soft); border-radius: 12px;
      width: 560px; max-width: 100%; max-height: 85vh; display: flex; flex-direction: column;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }
    [data-theme="dark"] .dialog { box-shadow: 0 8px 32px rgba(0,0,0,0.4); }

    .dialog-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid var(--border-soft); flex-shrink: 0;
    }
    .dialog-header h2 { font-size: var(--text-lg); font-weight: 700; }
    .dialog-close {
      width: 28px; height: 28px; border-radius: 6px; display: grid; place-items: center;
      color: var(--muted); transition: background 0.15s, color 0.15s;
    }
    .dialog-close:hover { background: var(--border-soft); color: var(--fg); }

    .dialog-body {
      flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px;
    }

    .setting-group { border: 1px solid var(--border-soft); border-radius: var(--radius); overflow: hidden; }
    .setting-group-title { font-size: var(--text-sm); font-weight: 600; padding: 10px 16px; background: var(--bg); border-bottom: 1px solid var(--border-soft); }
    .setting-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid var(--border-soft); }
    .setting-row:last-child { border-bottom: none; }
    .setting-row .sr-label { font-size: var(--text-sm); }
    .setting-row .sr-desc { font-size: var(--text-xs); color: var(--muted); margin-top: 2px; margin-right: 8px;}
    .setting-row .sr-control { flex-shrink: 0; }
    .setting-row input[type="text"], .setting-row select {
      padding: 5px 10px; border: 1px solid var(--border); border-radius: 6px;
      font-size: var(--text-sm); background: var(--surface); color: var(--fg); min-width: 200px;
    }
    .setting-row input.path-input { min-width: 320px; max-width: 100%; font-family: ui-monospace, 'Cascadia Code', Consolas, monospace; }
    .setting-row input.path-input:invalid { border-color: var(--danger); }
    .path-hint { font-size: var(--text-xs); color: var(--danger); margin-top: 4px; display: none; }
    .path-hint.visible { display: block; }

    .btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 14px; border-radius: 6px; font-size: var(--text-sm); font-weight: 500; transition: background 0.15s; }
    .btn-ghost { color: var(--fg); }
    .btn-ghost:hover { background: var(--bg); }
    .btn-sm { padding: 4px 10px; font-size: var(--text-xs); }

    .dialog-footer {
      display: flex; align-items: center; justify-content: flex-end; gap: 8px;
      padding: 12px 20px; border-top: 1px solid var(--border-soft); flex-shrink: 0;
    }
    .btn-cancel {
      padding: 7px 16px; border-radius: 6px; font-size: var(--text-sm); font-weight: 500;
      border: 1px solid var(--border); background: var(--surface); color: var(--fg);
      transition: background 0.15s;
    }
    .btn-cancel:hover { background: var(--bg); }
    .btn-primary {
      padding: 7px 20px; border-radius: 6px; font-size: var(--text-sm); font-weight: 500;
      background: var(--accent); color: var(--accent-on); border: none;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: var(--accent-hover); }
  </style>
</head>
<body>
<div class="dialog">
  <div class="dialog-header">
    <h2>系统设置</h2>
    <button class="dialog-close" onclick="window.close()" title="关闭">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
  </div>

  <div class="dialog-body">
    <!-- 数据存储：仅 SQLite 本地文件 -->
    <div class="setting-group">
      <div class="setting-group-title">数据存储</div>
      <div class="setting-row" style="align-items: flex-start;">
        <div>
          <div class="sr-label">SQLite 数据库文件</div>
          <div class="sr-desc">本地 SQLite 存储绝对路径</div>
        </div>
        <div class="sr-control" style="display:flex;flex-direction:column;align-items:flex-end;">
          <input
            type="text"
            id="sqlite-file-path"
            class="path-input"
            placeholder="C:\Users\you\AppData\Local\loomidbx\data.db"
            spellcheck="false"
            autocomplete="off"
          >
          <div id="sqlite-path-hint" class="path-hint" role="alert">请填写绝对路径（如 C:\...\data.db 或 /var/.../data.db）</div>
        </div>
      </div>
    </div>

    <!-- LLM 配置 -->
    <div class="setting-group">
      <div class="setting-group-title">LLM 配置</div>
      <div class="setting-row">
        <div>
          <div class="sr-label">Base URL</div>
          <div class="sr-desc">OpenAI 兼容接口地址</div>
        </div>
        <div class="sr-control">
          <input type="text" id="llm-base-url" placeholder="https://api.openai.com/v1" style="min-width:320px;">
        </div>
      </div>
      <div class="setting-row">
        <div>
          <div class="sr-label">API Key</div>
          <div class="sr-desc">用于 AI 辅助数据生成</div>
        </div>
        <div class="sr-control">
          <input type="password" id="llm-api-key" placeholder="sk-..." style="min-width:320px;" autocomplete="off">
        </div>
      </div>
      <div class="setting-row">
        <div>
          <div class="sr-label">模型名称</div>
          <div class="sr-desc">服务商提供的 model</div>
        </div>
        <div class="sr-control">
          <input type="text" id="llm-model-name" placeholder="gpt-4o-mini" style="min-width:320px;">
        </div>
      </div>
    </div>

    <!-- 外观 -->
    <div class="setting-group">
      <div class="setting-group-title">外观</div>
      <div class="setting-row">
        <div><div class="sr-label">主题</div></div>
        <div class="sr-control">
          <select onchange="setTheme(this.value)" id="settings-theme">
            <option value="light">浅色</option>
            <option value="dark">深色</option>
          </select>
        </div>
      </div>
      <div class="setting-row">
        <div><div class="sr-label">语言</div></div>
        <div class="sr-control">
          <select id="settings-lang">
            <option value="zh">中文</option>
            <option value="en">English</option>
          </select>
        </div>
      </div>
    </div>

    <!-- 隐私 -->
    <div class="setting-group">
      <div class="setting-group-title">隐私</div>
      <div class="setting-row">
        <div>
          <div class="sr-label">数据采集说明</div>
          <div class="sr-desc">软件仅回传账号标识、版本、启动记录。不会采集数据库连接信息、Schema 内容或生成数据。</div>
        </div>
        <div class="sr-control">
          <button class="btn btn-ghost btn-sm">查看详情</button>
        </div>
      </div>
    </div>
  </div>

  <div class="dialog-footer">
    <button class="btn-cancel" onclick="window.close()">取消</button>
    <button class="btn-primary" type="button" onclick="saveSettings()">确定</button>
  </div>
</div>

<script>
  // 占位存储配置：仅 SQLite 本地文件
  let storageConfig = {
    backend: "sqlite",
    sqlite: { filePath: "" }
  };

  let llmConfig = {
    baseUrl: "",
    apiKey: "",
    modelName: ""
  };

  function isAbsolutePath(path) {
    const p = (path || "").trim();
    if (!p || p.startsWith("~")) return false;
    if (/^[A-Za-z]:[\\/]/.test(p)) return true;
    if (/^\\\\[^\\]+\\[^\\]+/.test(p)) return true;
    if (p.startsWith("/")) return true;
    return false;
  }

  function validateSqlitePath(showHint) {
    const input = document.getElementById("sqlite-file-path");
    const hint = document.getElementById("sqlite-path-hint");
    if (!input) return false;
    const valid = isAbsolutePath(input.value);
    input.setCustomValidity(valid ? "" : "须为绝对路径");
    if (hint && showHint) hint.classList.toggle("visible", !valid);
    return valid;
  }

  function syncSqlitePathFromConfig() {
    const input = document.getElementById("sqlite-file-path");
    if (input) input.value = storageConfig.sqlite.filePath || "";
  }

  function syncLlmFromConfig() {
    const baseUrl = document.getElementById("llm-base-url");
    const apiKey = document.getElementById("llm-api-key");
    const modelName = document.getElementById("llm-model-name");
    if (baseUrl) baseUrl.value = llmConfig.baseUrl || "";
    if (apiKey) apiKey.value = llmConfig.apiKey || "";
    if (modelName) modelName.value = llmConfig.modelName || "";
  }

  function saveSettings() {
    const input = document.getElementById("sqlite-file-path");
    if (!validateSqlitePath(true)) {
      input?.focus();
      return;
    }
    storageConfig.sqlite.filePath = input.value.trim();
    llmConfig.baseUrl = document.getElementById("llm-base-url")?.value.trim() || "";
    llmConfig.apiKey = document.getElementById("llm-api-key")?.value.trim() || "";
    llmConfig.modelName = document.getElementById("llm-model-name")?.value.trim() || "";
    console.log("[占位] 设置已保存", { storage: storageConfig, llm: llmConfig });
    window.close();
  }

  window.getLlmConfig = function() { return llmConfig; };

  window.getStorageConfig = function() { return storageConfig; };
  window.updateStorageSettings = function(_backend, configData) {
    if (!configData || configData.filePath === undefined) return false;
    storageConfig.sqlite.filePath = String(configData.filePath).trim();
    syncSqlitePathFromConfig();
    console.log("[占位] 存储配置已更新", storageConfig);
    return true;
  };

  const sqlitePathInput = document.getElementById("sqlite-file-path");
  sqlitePathInput?.addEventListener("input", () => validateSqlitePath(false));
  sqlitePathInput?.addEventListener("blur", () => validateSqlitePath(true));

  // 主题同步
  const params = new URLSearchParams(window.location.search);
  if (params.get('theme') === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('settings-theme').value = 'dark';
  }
  function setTheme(t) { document.documentElement.setAttribute('data-theme', t); }

  syncSqlitePathFromConfig();
  syncLlmFromConfig();
</script>
</body>
</html>
