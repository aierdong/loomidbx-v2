page:
  role: entity-list
  purpose: project-management
  layout: sidebar-shell

  spec:
    summary: "Project CRUD page — lists LoomiDBX projects each with an ordered table configuration; supports create, edit, clone, subset creation, run, delete, and execution history"
    notes:
      - "create, edit, and clone share project-form modal; dialog-mode set by create-project, edit-project, or clone-project trigger"
      - "subset creation starts from an existing project's table configuration and saves a new independent Project"
      - "execution-history covers completed runs only; in-flight execution uses a separate progress UI (not yet specified)"
      - "responsive layout inferred — prototype has no media queries"

  sections:
    - role: navigation-hub
      layout: vertical-stack
      zones:
        top:
          components:
            - role: brand-logo
        middle:
          interactions:
            - intent: navigate
              navigates-to: schema-browser
            - intent: navigate
              navigates-to: projects
        bottom:
          interactions:
            - intent: sign-out

    - role: global-header
      purpose: app-top-bar
      layout: horizontal-strip
      interactions:
        - intent: toggle-theme
        - intent: navigate
          navigates-to: settings
      components:
        - role: form-field
          type: select
          purpose: language-switcher

    - role: entity-list
      layout: vertical-stack
      data:
        source: projects
        type: collection
        mutable: true
      interactions:
        - intent: create-project
          priority: primary
          target: project-form
          sets-mode: create
      components:
        - role: data-row
          purpose: project-card
          fields:
            - name: table-tags
              type: tag-list
              max-visible: 4
              overflow: badge
          interactions:
            - intent: edit-project
              trigger: row-body
              target: project-form
              sets-mode: edit
            - intent: clone-project
              trigger: row-action
              target: project-form
              sets-mode: clone
            - intent: run-project
              trigger: row-action
            - intent: open-dialog
              target: execution-history
              trigger: row-action
              disabled-when: "exec-count == 0"
            - intent: delete-project
              priority: destructive
              trigger: row-action

    - role: modal-dialog
      purpose: project-form
      state:
        dialog-mode:
          values: [create, edit, clone]
          persistent: false
      interactions:
        - intent: submit
          priority: primary
        - intent: create-subset-project
          target: subset-project-form
          visible-when: "dialog-mode == edit"
        - intent: dismiss
      components:
        - role: form-field
          purpose: project-name
        - role: form-field
          type: textarea
          purpose: description
        - role: form-field
          type: select
          purpose: db-connection
          visible-when: "dialog-mode == create"
        - role: inline-help
          purpose: clone-source-summary
          visible-when: "dialog-mode == clone"
        - role: inline-help
          purpose: table-generation-order
          visible-when: "dialog-mode in [edit, clone]"
        - role: data-row
          purpose: table-config-item
          visible-when: "dialog-mode in [edit, clone]"
          fields:
            - name: ordered-index
              type: number
            - name: table-name
              type: text
            - name: schema-table-meta
              type: display
            - name: quantity
              type: number-input
          interactions:
            - intent: remove-item
        - role: form-field
          type: multi-select
          purpose: add-table
          searchable: true
          visible-when: "dialog-mode in [edit, clone]"

    - role: modal-dialog
      purpose: subset-project-form
      data:
        source: project-table-configurations
        type: collection
        mutable: true
      state:
        selected-tables:
          type: collection
          persistent: false
        dependency-resolution:
          values: [include-required-upstream, inherit-external-source-strategy]
          persistent: false
      interactions:
        - intent: submit
          priority: primary
          disabled-when: "selected-tables missing required upstream tables"
        - intent: add-required-dependencies
        - intent: dismiss
      components:
        - role: form-field
          purpose: project-name
        - role: form-field
          type: textarea
          purpose: description
        - role: data-row
          purpose: selectable-table-config-item
          fields:
            - name: selected
              type: checkbox
            - name: ordered-index
              type: number
            - name: table-name
              type: text
            - name: quantity
              type: number-input
            - name: clear-strategy
              type: select
            - name: field-rule-reference
              type: display
          interactions:
            - intent: toggle-selection
        - role: inline-help
          purpose: dependency-impact
          visible-when: "selected-tables missing required upstream tables"
        - role: inline-help
          purpose: independent-project-copy

    - role: modal-dialog
      purpose: execution-history
      data:
        source: project-exec-history
        type: collection
        mutable: false
      interactions:
        - intent: dismiss
      components:
        - role: data-row
          purpose: history-record
          fields:
            - name: execution-name
              type: text
            - name: started-at
              type: datetime
            - name: status
              type: badge
              values: [success, failed, partial-failed]
            - name: total-row-count
              type: number
            - name: duration
              type: duration
          interactions:
            - intent: expand
              target: table-exec-detail
          components:
            - role: data-row
              purpose: table-exec-detail
              layout: collapsible
              default: collapsed
              data:
                source: project-exec-table-details
                type: collection
                lazy: true
                keyed-by: execution-id
              fields:
                - name: table-name
                  type: text
                - name: row-count
                  type: number
                - name: status
                  type: badge
                  values: [success, failed]
                - name: duration
                  type: duration
